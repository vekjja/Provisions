- name: Install Samba Server Packages
  become: true
  ansible.builtin.apt:
    pkg:
      - samba
      - samba-common-bin
    state: present
    update_cache: true

- name: Ensure share directories exist
  become: true
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode | default('0775') }}"
  loop: "{{ smb_shares | default([]) }}"
  when: item.path is defined
  ignore_errors: true

- name: Deploy Samba configuration
  become: true
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    backup: true
  notify: restart samba

- name: Extract SMB valid_users lists
  ansible.builtin.set_fact:
    smb_share_valid_users: >-
      {{ smb_shares | default([]) | selectattr('valid_users', 'defined') | map(attribute='valid_users') | list }}

- name: Build unique SMB users list
  ansible.builtin.set_fact:
    smb_users_unique: >-
      {{ (smb_share_valid_users | default([]) | map('split', ',') | flatten | map('trim') | list | unique) | default([]) }}

- name: Debug - Check if smb_user_password is defined
  ansible.builtin.debug:
    msg:
      - "smb_user_password is {{ 'defined' if smb_user_password is defined else 'NOT defined' }}"
      - "smb_user_check.results is {{ 'defined' if smb_user_check.results is defined else 'NOT defined' }}"
      - "Number of results: {{ smb_user_check.results | default([]) | length }}"
  when: false  # Disable debug by default, set to true when needed

- name: Check if SMB user exists
  become: true
  ansible.builtin.command: pdbedit -L -v "{{ item }}"
  register: smb_user_check
  changed_when: false
  failed_when: false
  loop: "{{ smb_users_unique | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: Add SMB user with password if not exists
  become: true
  ansible.builtin.shell: |
    set -o pipefail
    (echo "{{ smb_user_password }}"; echo "{{ smb_user_password }}") \
      | smbpasswd -a -s "{{ item.item }}"
  when:
    - smb_user_check.results is defined
    - item.rc != 0
    - smb_user_password is defined
  loop: "{{ smb_user_check.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  no_log: true

- name: Set password for existing SMB user
  become: true
  ansible.builtin.shell: |
    set -o pipefail
    (echo "{{ smb_user_password }}"; echo "{{ smb_user_password }}") \
      | smbpasswd -s "{{ item.item }}"
  when:
    - smb_user_check.results is defined
    - item.rc == 0
    - smb_user_password is defined
  loop: "{{ smb_user_check.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  no_log: true

- name: Ensure smbd service is enabled and started
  become: true
  ansible.builtin.systemd:
    name: smbd
    enabled: true
    state: started

- name: Ensure nmbd service is enabled and started
  become: true
  ansible.builtin.systemd:
    name: nmbd
    enabled: true
    state: started
